<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg-color: var(--tg-theme-bg-color, #121214);
        --text-color: var(--tg-theme-text-color, #ffffff);
        --btn-color: var(--tg-theme-button-color, #ff9f0a);
        --secondary-bg: var(--tg-theme-secondary-bg-color, #22242b);
        --border-color: var(--tg-theme-hint-color, #4a4a50);

        --accent: #ff9f0a;
        --accent-glow: rgba(255, 159, 10, 0.5);
        --success: #4caf50;
        
        --glass-bg: rgba(34, 36, 43, 0.75);
        --glass-border: rgba(255, 255, 255, 0.1);
      }

      body {
        background-color: var(--bg-color);
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        padding: 16px;
        box-sizing: border-box;
      }

      /* --- Счёт --- */
      #score {
        font-size: 68px;
        font-weight: 800;
        line-height: 1;
        text-align: center;
        margin-bottom: 4px;
        letter-spacing: -1px;
        text-shadow: 0 4px 12px rgba(0, 0, 0, 0.6);
      }
      .label {
        color: #999;
        font-size: 14px;
        text-align: center;
        margin-bottom: 28px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* --- Статистика --- */
      .stats-panel {
        width: 100%;
        max-width: 380px;
        background: var(--glass-bg);
        border-radius: 18px;
        padding: 18px;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-bottom: 24px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
      }
      .stat-item { text-align: center; }
      .stat-label {
        font-size: 11px;
        color: #888;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        margin-bottom: 6px;
      }
      .stat-value {
        font-weight: 800;
        font-size: 26px;
        color: var(--accent);
        text-shadow: 0 0 10px var(--accent-glow);
      }

      /* --- Кнопка клика --- */
      button#clickBtn {
        width: 260px;
        height: 260px;
        border-radius: 52%;
        border: none;
        /* Радиальный градиент для объёма */
        background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 65%);
        background-color: var(--btn-color);
        color: #000;
        font-size: 36px;
        cursor: pointer;
        user-select: none;
        position: relative;
        z-index: 2;
        transition: transform 0.06s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
        box-shadow:
          0 20px 40px rgba(255, 159, 10, 0.4),
          inset 0 0 0 3px rgba(255, 255, 255, 0.15);
      }
      button#clickBtn:active {
        transform: scale(0.92);
        box-shadow:
          0 12px 24px rgba(255, 159, 10, 0.3),
          inset 0 0 0 3px rgba(255, 255, 255, 0.1);
      }
      button#clickBtn.autopulse {
        animation: pulse 2s infinite;
      }
      @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.5); }
        70% { box-shadow: 0 0 0 16px rgba(76, 175, 80, 0); }
        100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); }
      }

      /* --- Магазин --- */
      .shop-container {
        width: 100%;
        max-width: 380px;
        background: var(--glass-bg);
        border-radius: 18px;
        padding: 20px;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
      }
      .shop-title {
        margin: 0 0 20px 0;
        font-size: 20px;
        font-weight: 700;
        text-align: center;
        color: var(--text-color);
      }
      .upgrade-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 14px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
      }
      .upgrade-row:last-child { border-bottom: none; }
      .upgrade-info {
        display: flex;
        flex-direction: column;
        min-width: 0;
      }
      .upgrade-name {
        font-weight: 700;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        color: var(--text-color);
      }
      .upgrade-desc {
        font-size: 13px;
        color: #aaa;
        margin-top: 4px;
      }
      .upgrade-price-box {
        text-align: right;
        min-width: 96px;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
      }
      .upgrade-price {
        font-weight: 700;
        color: var(--accent);
        font-size: 16px;
        margin-bottom: 8px;
      }
      .progress-bar {
        width: 100%;
        height: 6px;
        background: rgba(255,255,255,0.1);
        border-radius: 3px;
        margin-top: 2px;
        overflow: hidden;
      }
      .progress-fill {
        height: 100%;
        background: linear-gradient(90deg, var(--accent), #ff6b00);
        width: 0%;
        transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      button.buy-btn {
        border: none;
        background: transparent;
        color: white;
        cursor: pointer;
        padding: 10px 20px;
        border-radius: 10px;
        font-size: 15px;
        font-weight: 700;
        transition: all 0.2s;
        min-width: 88px;
        text-align: center;
      }
      button.buy-btn:hover:not(:disabled) {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(255,159,10,0.3);
      }
      button.buy-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        filter: grayscale(1);
      }

      /* --- Эффекты --- */
      .float-number {
        position: absolute;
        pointer-events: none;
        font-weight: 800;
        color: var(--accent);
        font-size: 32px;
        animation: floatUp 1s forwards;
        z-index: 3;
        text-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      @keyframes floatUp {
        0% { opacity: 1; transform: translateY(0) scale(1); }
        100% { opacity: 0; transform: translateY(-140px) scale(1.6); }
      }
    </style>
  </head>
  <body>
    <!-- Счёт -->
    <div id="score">0</div>
    <div class="label">Монет: <span id="coins">0</span></div>

    <!-- Статистика -->
    <div class="stats-panel">
      <div class="stat-item">
        <div class="stat-label">Сила клика</div>
        <div class="stat-value" id="statPower">1</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Доход/сек</div>
        <div class="stat-value" id="statPerSec">0</div>
      </div>
    </div>

    <!-- Кнопка клика -->
    <button id="clickBtn">КЛИК</button>

    <!-- Магазин -->
    <div class="shop-container">
      <h3 class="shop-title">Магазин улучшений</h3>

      <div class="upgrade-row">
        <div class="upgrade-info">
          <span class="upgrade-name">Сила клика +1</span>
          <span class="upgrade-desc">Каждый клик приносит на 1 больше</span>
        </div>
        <div class="upgrade-price-box">
          <span class="upgrade-price" id="pricePower">50</span>
          <div class="progress-bar"><div class="progress-fill" id="progPower"></div></div>
        </div>
        <button class="buy-btn" id="btnBuyPower">Купить</button>
      </div>

      <div class="upgrade-row">
        <div class="upgrade-info">
          <span class="upgrade-name">Автокликер</span>
          <span class="upgrade-desc">+1 монета каждую секунду</span>
        </div>
        <div class="upgrade-price-box">
          <span class="upgrade-price" id="priceAuto">100</span>
          <div class="progress-bar"><div class="progress-fill" id="progAuto"></div></div>
        </div>
        <button class="buy-btn" id="btnBuyAuto">Купить</button>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      // Загрузка данных
      let coins = parseInt(localStorage.getItem('clicker_coins')) || 0;
      let power = parseInt(localStorage.getItem('clicker_power')) || 1;
      let autoEnabled = localStorage.getItem('clicker_auto') === 'true';
      let autoInterval = null;

      const scoreEl = document.getElementById('score');
      const coinsEl = document.getElementById('coins');
      const statPowerEl = document.getElementById('statPower');
      const statPerSecEl = document.getElementById('statPerSec');
      const clickBtn = document.getElementById('clickBtn');

      const btnBuyPower = document.getElementById('btnBuyPower');
      const pricePowerEl = document.getElementById('pricePower');
      const progPowerEl = document.getElementById('progPower');

      const btnBuyAuto = document.getElementById('btnBuyAuto');
      const priceAutoEl = document.getElementById('priceAuto');
      const progAutoEl = document.getElementById('progAuto');

      function save() {
        localStorage.setItem('clicker_coins', coins);
        localStorage.setItem('clicker_power', power);
        localStorage.setItem('clicker_auto', autoEnabled);

        // Отправляем данные боту
        tg.sendData(JSON.stringify({ coins, power, autoEnabled }));
      }

      function updateUI() {
        scoreEl.textContent = coins;
        coinsEl.textContent = coins;
        statPowerEl.textContent = power;
        
        const perSec = autoEnabled ? power : 0; // упрощённо: автоклик даёт +power в сек
        statPerSecEl.textContent = perSec;

        // Сила клика
        const costPower = 50 * power; // цена растёт с каждым уровнем
        pricePowerEl.textContent = costPower;
        progPowerEl.style.width = Math.min(100, (coins / costPower) * 100) + '%';
        btnBuyPower.disabled = coins < costPower;

        // Автокликер
        const costAuto = 100;
        priceAutoEl.textContent = costAuto;
        progAutoEl.style.width = Math.min(100, (coins / costAuto) * 100) + '%';
        btnBuyAuto.disabled = coins < costAuto || autoEnabled;
        if (autoEnabled) {
          btnBuyAuto.textContent = 'ВКЛ';
          btnBuyAuto.style.background = 'var(--success)';
          btnBuyAuto.style.color = '#000';
        } else {
          btnBuyAuto.textContent = 'Купить';
          btnBuyAuto.style.background = '';
          btnBuyAuto.style.color = '';
        }

        clickBtn.classList.toggle('autopulse', autoEnabled);
      }

      updateUI();

      // Клик
      clickBtn.addEventListener('click', (e) => {
        coins += power;
        createFloatNumber(power, e.clientX, e.clientY);
        save();
        updateUI();
      });

      // Купить силу клика
      btnBuyPower.addEventListener('click', () => {
        const cost = 50 * power;
        if (coins >= cost) {
          coins -= cost;
          power++;
          save();
          updateUI();
        }
      });

      // Купить автокликер
      btnBuyAuto.addEventListener('click', () => {
        if (!autoEnabled && coins >= 100) {
          coins -= 100;
          autoEnabled = true;
          startAutoClick();
          save();
          updateUI();
        }
      });
