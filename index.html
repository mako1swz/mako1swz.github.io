<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Кликер</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>/* стиль сохранён как в оригинале, добавлены классы под новые улучшения */ 
:root {
  --bg: var(--tg-theme-bg-color, #111114);
  --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c20);
  --text: var(--tg-theme-text-color, #ffffff);
  --hint: var(--tg-theme-hint-color, #98989f);
  --button: var(--tg-theme-button-color, #ff9f0a);
  --button-text: var(--tg-theme-button-text-color, #000000);
  --card: rgba(255, 255, 255, 0.08);
  --success: #30d158;
  --danger: #ff453a;
  --border: rgba(255, 255, 255, 0.1);
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { margin: 0; min-height: 100vh; padding: 16px; overflow-x: hidden; color: var(--text); background: radial-gradient(circle at top, rgba(255, 159, 10, 0.14), transparent 34%), var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
.app { width: 100%; max-width: 420px; min-height: calc(100vh - 32px); margin: auto; display: flex; flex-direction: column; }
.header { text-align: center; margin: 12px 0 20px; }
.header h1 { margin: 0 0 6px; font-size: 25px; }
.header p { margin: 0; color: var(--hint); font-size: 14px; }
.tabs { display: flex; gap: 8px; padding: 5px; margin-bottom: 20px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); }
.tab-btn { flex: 1; border: 0; border-radius: 12px; padding: 12px; color: var(--hint); background: transparent; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s ease; }
.tab-btn.active { color: var(--button-text); background: var(--button); box-shadow: 0 5px 18px rgba(255, 159, 10, 0.25); }
.view { display: none; animation: fadeIn 0.2s ease; }
.view.active { display: block; }
.stats-card { padding: 20px; text-align: center; border-radius: 22px; background: var(--card); border: 1px solid var(--border); box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18); }
.coins-label { color: var(--hint); font-size: 14px; margin-bottom: 5px; }
#score { font-size: clamp(45px, 16vw, 72px); line-height: 1; font-weight: 800; letter-spacing: -2px; word-break: break-word; }
.stats { display: flex; justify-content: center; gap: 24px; margin-top: 16px; }
.stat { display: flex; flex-direction: column; gap: 3px; }
.stat strong { font-size: 17px; }
.stat span { color: var(--hint); font-size: 12px; }
.click-area { position: relative; display: flex; justify-content: center; align-items: center; min-height: 280px; }
#clickBtn { width: min(68vw, 230px); height: min(68vw, 230px); max-width: 230px; max-height: 230px; border: none; border-radius: 50%; color: var(--button-text); background: linear-gradient(145deg, var(--button), #ff7b00); font-size: 25px; font-weight: 800; cursor: pointer; user-select: none; box-shadow: 0 15px 35px rgba(255, 159, 10, 0.3), inset 0 -8px 0 rgba(0, 0, 0, 0.12); transition: transform 0.1s ease, filter 0.2s ease; }
#clickBtn:active { transform: scale(0.93); filter: brightness(0.9); }
.floating-coin { position: absolute; pointer-events: none; color: var(--button); font-weight: 800; font-size: 20px; animation: floatUp 0.8s ease-out forwards; }
.section-title { margin: 0 0 12px; font-size: 20px; }
.shop-container { display: flex; flex-direction: column; gap: 10px; }
.upgrade-btn, .action-btn { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 15px; color: var(--text); background: var(--card); text-align: left; cursor: pointer; transition: 0.2s ease; }
.upgrade-btn { display: flex; align-items: center; gap: 12px; }
.upgrade-btn:not(:disabled):active, .action-btn:active { transform: scale(0.98); }
.upgrade-btn:disabled { opacity: 0.42; cursor: not-allowed; }
.upgrade-icon { width: 42px; height: 42px; flex: 0 0 42px; display: grid; place-items: center; border-radius: 12px; background: rgba(255, 159, 10, 0.18); font-size: 21px; }
.upgrade-info { flex: 1; }
.upgrade-title { display: block; margin-bottom: 4px; font-size: 15px; font-weight: 700; }
.upgrade-description { display: block; color: var(--hint); font-size: 12px; }
.upgrade-price { color: var(--button); font-size: 13px; font-weight: 800; white-space: nowrap; }
.upgrade-btn.owned { border-color: rgba(48, 209, 88, 0.4); background: rgba(48, 209, 88, 0.12); }
.upgrade-btn.owned .upgrade-price { color: var(--success); }
.actions { display: flex; gap: 8px; margin-top: 18px; }
.action-btn { text-align: center; font-size: 13px; font-weight: 600; }
.footer { margin-top: auto; padding-top: 20px; text-align: center; color: var(--hint); font-size: 11px; }

@keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-75px) scale(1.25); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
@media (max-height: 650px) {
  .header { margin: 4px 0 12px; }
  .click-area { min-height: 220px; }
  .stats-card { padding: 14px; }
}
</style>
</head>
<body>
<main class="app">
  <header class="header">
    <h1>🪙 Кликер</h1>
    <p>Кликай и покупай улучшения</p>
  </header>

  <nav class="tabs">
    <button class="tab-btn active" id="tabGame">Игра</button>
    <button class="tab-btn" id="tabShop">Магазин</button>
  </nav>

  <section id="viewGame" class="view active">
    <div class="stats-card">
      <div class="coins-label">Твои монеты</div>
      <div id="score">0</div>
      <div class="stats">
        <div class="stat">
          <strong id="powerValue">1</strong>
          <span>за клик</span>
        </div>
        <div class="stat">
          <strong id="incomeValue">0</strong>
          <span>в секунду</span>
        </div>
      </div>
    </div>

    <div class="click-area" id="clickArea">
      <button id="clickBtn">КЛИК</button>
    </div>
  </section>

  <section id="viewShop" class="view">
    <h2 class="section-title">Улучшения</h2>

    <div class="shop-container" id="upgradesContainer">
      <!-- Улучшение 1: Сила клика (увеличивает доход за клик) -->
      <button class="upgrade-btn" id="upgradeClickPower">
        <span class="upgrade-icon">⚡</span>
        <span class="upgrade-info">
          <span class="upgrade-title">Сила клика</span>
          <span class="upgrade-description" id="descClickPower">Увеличивает доход за один клик</span>
        </span>
        <span class="upgrade-price" id="priceClickPower">50 🪙</span>
      </button>

      <!-- Улучшение 2: Автокликер (многоуровневый с эксп. ростом цены) -->
      <button class="upgrade-btn" id="upgradeAutoPower">
        <span class="upgrade-icon">🤖</span>
        <span class="upgrade-info">
          <span class="upgrade-title">Автокликер</span>
          <span class="upgrade-description" id="descAutoPower">Увеличивает монеты в секунду</span>
        </span>
        <span class="upgrade-price" id="priceAutoPower">100 🪙</span>
      </button>

      <!-- Новый Улучшение 3: Бонус к монетам (многоуровневый) -->
      <button class="upgrade-btn" id="upgradeGoldBoost">
        <span class="upgrade-icon">💎</span>
        <span class="upgrade-info">
          <span class="upgrade-title">Бонус монет</span>
          <span class="upgrade-description" id="descGoldBoost">Увеличивает общую прибыль на проценты</span>
        </span>
        <span class="upgrade-price" id="priceGoldBoost">75 🪙</span>
      </button>
    </div>

    <div class="actions">
      <button class="action-btn" id="saveBtn">💾 Сохранить</button>
      <button class="action-btn" id="resetBtn">♻️ Сбросить</button>
    </div>
  </section>

  <footer class="footer">
    Прогресс сохраняется автоматически
  </footer>
</main>

<script>
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.enableClosingConfirmation?.();
}

const STORAGE_KEY = "telegram_clicker_save_v2";

// Базовые стейты
const defaultState = {
  coins: 0,
  // Базовая сила клика и дополнительные уровни апгрейдов
  clickPower: 1,
  // Уровни апгрейдов
  upgrades: {
    clickPower: { level: 0, basePrice: 50, growth: 1.75 },
    autoPower: { level: 0, basePrice: 100, growth: 1.75, baseIncome: 1 },
    goldBoost: { level: 0, basePrice: 75, growth: 1.75, multiplier: 1 }
  }
};

// Загружаем состояние
function loadState() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (!saved) return { ...defaultState };
    // Восстановление, распределяем поля
    return {
      coins: Math.max(0, Number(saved.coins) || 0),
      clickPower: Math.max(1, Number(saved.clickPower) || 1),
      upgrades: saved.upgrades || { ...defaultState.upgrades }
    };
  } catch {
    return { ...defaultState };
  }
}

let state = loadState();
let autoInterval = null;

const scoreEl = document.getElementById("score");
const powerValueEl = document.getElementById("powerValue");
const incomeValueEl = document.getElementById("incomeValue");
const clickBtn = document.getElementById("clickBtn");
const clickArea = document.getElementById("clickArea");

const upgradeClickPowerBtn = document.getElementById("upgradeClickPower");
const upgradeAutoPowerBtn = document.getElementById("upgradeAutoPower");
const upgradeGoldBoostBtn = document.getElementById("upgradeGoldBoost");

const priceClickPowerEl = document.getElementById("priceClickPower");
const priceAutoPowerEl = document.getElementById("priceAutoPower");
const priceGoldBoostEl = document.getElementById("priceGoldBoost");

const descClickPowerEl = document.getElementById("descClickPower");
const descAutoPowerEl = document.getElementById("descAutoPower");
const descGoldBoostEl = document.getElementById("descGoldBoost");

const saveBtn = document.getElementById("saveBtn");
const resetBtn = document.getElementById("resetBtn");

const tabGame = document.getElementById("tabGame");
const tabShop = document.getElementById("tabShop");
const viewGame = document.getElementById("viewGame");
const viewShop = document.getElementById("viewShop");

function saveState(sendToTelegram = false) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  if (sendToTelegram && tg) {
    tg.sendData(JSON.stringify(state));
  }
}
function formatNumber(n) {
  return new Intl.NumberFormat("ru-RU").format(n);
}
function updateUI() {
  scoreEl.textContent = formatNumber(state.coins);
  powerValueEl.textContent = formatNumber(state.clickPower);
  // Инком за секунду зависит от уровня автокликера
  const autoLevel = state.upgrades.autoPower?.level || 0;
  const autoIncome = (state.upgrades.autoPower?.level > 0)
    ? Math.round(state.upgrades.autoPower.baseIncome * Math.pow(2, autoLevel - 1) * 10) / 10
    : 0;
  incomeValueEl.textContent = formatNumber(autoIncome);

  // Цена для следующих уровней
  // Система экспроста: price = basePrice * growth^(level)
  const nextClickPrice = Math.ceil(state.upgrades.clickPower.basePrice * Math.pow(state.upgrades.clickPower.growth, state.upgrades.clickPower.level));
  const nextAutoPrice = Math.ceil(state.upgrades.autoPower.basePrice * Math.pow(state.upgrades.autoPower.growth, state.upgrades.autoPower.level));
  const nextGoldPrice = Math.ceil(state.upgrades.goldBoost.basePrice * Math.pow(state.upgrades.goldBoost.growth, state.upgrades.goldBoost.level));

  priceClickPowerEl.textContent = `${nextClickPrice} 🪙`;
  priceAutoPowerEl.textContent = `${nextAutoPrice} 🪙`;
  priceGoldBoostEl.textContent = `${nextGoldPrice} 🪙`;

  // Отключение покупки если недостаточно монет
  upgradeClickPowerBtn.disabled = state.coins < nextClickPrice;
  upgradeAutoPowerBtn.disabled = state.coins < nextAutoPrice;
  upgradeGoldBoostBtn.disabled = state.coins < nextGoldPrice;

  // Обновим описания и остальные поля
  const clickGain = state.clickPower;
  descClickPowerEl.textContent = `Увеличивает доход за один клик. Теперь каждая кликовая единица приносит ${clickGain} монет.`;

  const autoEnabled = state.upgrades.autoPower.level > 0;
  const autoDesc = autoEnabled
    ? `Автокликер: уровень ${state.upgrades.autoPower.level}, приносит монеты каждую секунду`
    : "Автокликер: пока не включён";
  descAutoPowerEl.textContent = autoDesc;

  const goldBoostLevel = state.upgrades.goldBoost.level;
  const goldDesc = goldBoostLevel > 0
    ? `Бонус монет: уровень ${goldBoostLevel}, общий множитель прибыли растёт при каждом апгрейде`
    : "Бонус монет: повышает общую прибыль на проценты";
  descGoldBoostEl.textContent = goldDesc;
}
function addCoins(amount) {
  state.coins += amount;
  updateUI();
  saveState();
}
function showFloatingCoins(amount) {
  const el = document.createElement("span");
  el.className = "floating-coin";
  el.textContent = `+${amount}`;
  const areaRect = clickArea.getBoundingClientRect();
  const btnRect = clickBtn.getBoundingClientRect();
  el.style.left = `${btnRect.left - areaRect.left + btnRect.width / 2 - 15}px`;
  el.style.top = `${btnRect.top - areaRect.top + btnRect.height / 2 - 10}px`;
  clickArea.appendChild(el);
  setTimeout(() => el.remove(), 800);
}
function startAutoClicker() {
  stopAutoClicker();
  const level = state.upgrades.autoPower.level;
  if (level <= 0) return;
  // Пример: каждый уровень добавляет фиксированный доход, например 1 монету за уровень
  const incomePerSec = Math.pow(2, level - 1) * (state.upgrades.autoPower?.baseIncome || 1);
  autoInterval = setInterval(() => {
    addCoins(incomePerSec);
  }, 1000);
}
function stopAutoClicker() {
  if (autoInterval) {
    clearInterval(autoInterval);
    autoInterval = null;
  }
}
function switchView(showGame) {
  tabGame.classList.toggle("active", showGame);
  tabShop.classList.toggle("active", !showGame);
  viewGame.classList.toggle("active", showGame);
  viewShop.classList.toggle("active", !showGame);
}

// Эвристика: обработчики улучшений
upgradeClickPowerBtn.addEventListener("click", () => {
  // Цена растёт как basePrice * growth^level
  const nextPrice = Math.ceil(state.upgrades.clickPower.basePrice * Math.pow(state.upgrades.clickPower.growth, state.upgrades.clickPower.level));
  if (state.coins < nextPrice) return;
  state.coins -= nextPrice;
  state.upgrades.clickPower.level = (state.upgrades.clickPower.level || 0) + 1;
  // Увеличиваем силу клика: линейно или экспоненциально? Здесь простая линейная зависимость
  state.clickPower = 1 + state.upgrades.clickPower.level;
  // Обновляем UI
  updateUI();
  saveState();
});
upgradeAutoPowerBtn.addEventListener("click", () => {
  const nextPrice = Math.ceil(state.upgrades.autoPower.basePrice * Math.pow(state.upgrades.autoPower.growth, state.upgrades.autoPower.level));
  if (state.coins < nextPrice) return;
  state.coins -= nextPrice;
  state.upgrades.autoPower.level = (state.upgrades.autoPower.level || 0) + 1;
  // после покупки включаем автокликер если это первый уровень
  if (state.upgrades.autoPower.level === 1) {
    // подготавливаем инкремент
    // базовый уровень даёт базовый доход
  }
  updateUI();
  saveState();
  // если включили новый уровень, перезапускаем авто
  startAutoClicker();
});
upgradeGoldBoostBtn.addEventListener("click", () => {
  const nextPrice = Math.ceil(state.upgrades.goldBoost.basePrice * Math.pow(state.upgrades.goldBoost.growth, state.upgrades.goldBoost.level));
  if (state.coins < nextPrice) return;
  state.coins -= nextPrice;
  state.upgrades.goldBoost.level = (state.upgrades.goldBoost.level || 0) + 1;
  // Применяем бонус: увеличиваем базовый множитель прибыли
  // Например, множитель profits = 1 + 0.15 * level
  const boost = 1 + 0.15 * state.upgrades.goldBoost.level;
  // Принудительно сохраним в state для простоты визуализации
  state.upgrades.goldBoost.multiplier = boost;
  updateUI();
  saveState();
});

// кнопки навигации
document.getElementById("saveBtn").addEventListener("click", () => {
  saveState(true);
  const oldText = saveBtn.textContent;
  saveBtn.textContent = "✅ Отправлено";
  setTimeout(() => { saveBtn.textContent = oldText; }, 1200);
});
document.getElementById("resetBtn").addEventListener("click", () => {
  const confirmed = confirm("Точно сбросить весь прогресс?");
  if (!confirmed) return;
  stopAutoClicker();
  state = { ...defaultState };
  saveState();
  updateUI();
});
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "hidden") saveState();
});
window.addEventListener("beforeunload", () => saveState());

// Клик по кнопке
clickBtn.addEventListener("click", () => {
  addCoins(state.clickPower);
  showFloatingCoins(state.clickPower);
});

// Навигация
document.getElementById("tabGame").addEventListener("click", () => switchView(true));
document.getElementById("tabShop").addEventListener("click", () => switchView(false));

// Инициализация
updateUI();
if (state.upgrades.autoPower.level > 0) {
  startAutoClicker();
}

// Визуализация экспоненциальной цены и динамика по умолчанию
</script>
</body>
</html>
