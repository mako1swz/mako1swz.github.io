<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bg: var(--tg-theme-bg-color, #111114);
            --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c20);
            --text: var(--tg-theme-text-color, #ffffff);
            --hint: var(--tg-theme-hint-color, #98989f);
            --button: var(--tg-theme-button-color, #ff9f0a);
            --button-text: var(--tg-theme-button-text-color, #000000);
            --card: rgba(255, 255, 255, 0.08);
            --success: #30d158;
            --danger: #ff453a;
            --border: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; min-height: 100vh; padding: 16px; overflow-x: hidden; color: var(--text); background: radial-gradient(circle at top, rgba(255, 159, 10, 0.14), transparent 34%), var(--bg); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        .app { width: 100%; max-width: 420px; min-height: calc(100vh - 32px); margin: auto; display: flex; flex-direction: column; }
        .header { text-align: center; margin: 12px 0 20px; }
        .header h1 { margin: 0 0 6px; font-size: 25px; }
        .header p { margin: 0; color: var(--hint); font-size: 14px; }
        .tabs { display: flex; gap: 8px; padding: 5px; margin-bottom: 20px; border-radius: 16px; background: var(--card); border: 1px solid var(--border); }
        .tab-btn { flex: 1; border: 0; border-radius: 12px; padding: 12px; color: var(--hint); background: transparent; font-size: 15px; font-weight: 600; cursor: pointer; transition: 0.2s ease; }
        .tab-btn.active { color: var(--button-text); background: var(--button); box-shadow: 0 5px 18px rgba(255, 159, 10, 0.25); }
        .view { display: none; animation: fadeIn 0.2s ease; }
        .view.active { display: block; }
        .stats-card { padding: 20px; text-align: center; border-radius: 22px; background: var(--card); border: 1px solid var(--border); box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18); }
        .coins-label { color: var(--hint); font-size: 14px; margin-bottom: 5px; }
        #score { font-size: clamp(45px, 16vw, 72px); line-height: 1; font-weight: 800; letter-spacing: -2px; word-break: break-word; }
        .stats { display: flex; justify-content: center; gap: 24px; margin-top: 16px; }
        .stat { display: flex; flex-direction: column; gap: 3px; }
        .stat strong { font-size: 17px; }
        .stat span { color: var(--hint); font-size: 12px; }
        .click-area { position: relative; display: flex; justify-content: center; align-items: center; min-height: 280px; }
        #clickBtn { width: min(68vw, 230px); height: min(68vw, 230px); max-width: 230px; max-height: 230px; border: none; border-radius: 50%; color: var(--button-text); background: linear-gradient(145deg, var(--button), #ff7b00); font-size: 25px; font-weight: 800; cursor: pointer; user-select: none; box-shadow: 0 15px 35px rgba(255, 159, 10, 0.3), inset 0 -8px 0 rgba(0, 0, 0, 0.12); transition: transform 0.1s ease, filter 0.2s ease; }
        #clickBtn:active { transform: scale(0.93); filter: brightness(0.9); }
        .floating-coin { position: absolute; pointer-events: none; color: var(--button); font-weight: 800; font-size: 20px; animation: floatUp 0.8s ease-out forwards; }
        .section-title { margin: 0 0 12px; font-size: 20px; }
        .shop-container { display: flex; flex-direction: column; gap: 10px; }
        .upgrade-btn, .action-btn { width: 100%; padding: 15px; border: 1px solid var(--border); border-radius: 15px; color: var(--text); background: var(--card); text-align: left; cursor: pointer; transition: 0.2s ease; }
        .upgrade-btn { display: flex; align-items: center; gap: 12px; }
        .upgrade-btn:not(:disabled):active, .action-btn:active { transform: scale(0.98); }
        .upgrade-btn:disabled { opacity: 0.42; cursor: not-allowed; }
        .upgrade-icon { width: 42px; height: 42px; flex: 0 0 42px; display: grid; place-items: center; border-radius: 12px; background: rgba(255, 159, 10, 0.18); font-size: 21px; }
        .upgrade-info { flex: 1; }
        .upgrade-title { display: block; margin-bottom: 4px; font-size: 15px; font-weight: 700; }
        .upgrade-description { display: block; color: var(--hint); font-size: 12px; }
        .upgrade-level { display: block; color: var(--button); font-size: 11px; font-weight: 700; margin-bottom: 2px; }
        .upgrade-price { color: var(--button); font-size: 13px; font-weight: 800; white-space: nowrap; }
        .upgrade-btn.owned { border-color: rgba(48, 209, 88, 0.4); background: rgba(48, 209, 88, 0.12); }
        .upgrade-btn.owned .upgrade-price { color: var(--success); }
        .actions { display: flex; gap: 8px; margin-top: 18px; }
        .action-btn { text-align: center; font-size: 13px; font-weight: 600; }
        .footer { margin-top: auto; padding-top: 20px; text-align: center; color: var(--hint); font-size: 11px; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-75px) scale(1.25); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
        @media (max-height: 650px) { .header { margin: 4px 0 12px; } .click-area { min-height: 220px; } .stats-card { padding: 14px; } }
    </style>
</head>
<body>
<main class="app">
    <header class="header">
        <h1>🪙 Кликер</h1>
        <p>Кликай и покупай улучшения</p>
    </header>
    <nav class="tabs">
        <button class="tab-btn active" id="tabGame">Игра</button>
        <button class="tab-btn" id="tabShop">Магазин</button>
    </nav>
    
    <section id="viewGame" class="view active">
        <div class="stats-card">
            <div class="coins-label">Твои монеты</div>
            <div id="score">0</div>
            <div class="stats">
                <div class="stat">
                    <strong id="powerValue">1</strong>
                    <span>за клик</span>
                </div>
                <div class="stat">
                    <strong id="incomeValue">0</strong>
                    <span>в секунду</span>
                </div>
            </div>
        </div>
        <div class="click-area" id="clickArea">
            <button id="clickBtn">КЛИК</button>
        </div>
    </section>

    <section id="viewShop" class="view">
        <h2 class="section-title">Улучшения</h2>
        <div class="shop-container">
            <!-- Сила клика -->
            <button class="upgrade-btn" id="buyPower">
                <span class="upgrade-icon">⚡</span>
                <span class="upgrade-info">
                    <span class="upgrade-title">Сила клика</span>
                    <span class="upgrade-description">Увеличивает доход за один клик</span>
                    <span class="upgrade-level" id="powerLevel">Уровень: 1</span>
                    <span class="upgrade-price" id="powerPrice">50 🪙</span>
                </span>
            </button>
            <!-- Бонус монет (новый) -->
            <button class="upgrade-btn" id="buyBonus">
                <span class="upgrade-icon">💰</span>
                <span class="upgrade-info">
                    <span class="upgrade-title">Бонус монет</span>
                    <span class="upgrade-description">Дает разовый множитель к награде за клик</span>
                    <span class="upgrade-level" id="bonusLevel">Уровень: 1</span>
                    <span class="upgrade-price" id="bonusPrice">200 🪙</span>
                </span>
            </button>
            <!-- Автокликер -->
            <button class="upgrade-btn" id="buyAuto">
                <span class="upgrade-icon">🤖</span>
                <span class="upgrade-info">
                    <span class="upgrade-title">Автокликер</span>
                    <span class="upgrade-description">Приносит монеты каждую секунду</span>
                    <span class="upgrade-level" id="autoLevel">Уровень: 0</span>
                    <span class="upgrade-price" id="autoPrice">100 🪙</span>
                </span>
            </button>
            <!-- Клик-ферма (новый) -->
            <button class="upgrade-btn" id="buyFarm">
                <span class="upgrade-icon">🏭</span>
                <span class="upgrade-info">
                    <span class="upgrade-title">Клик-ферма</span>
                    <span class="upgrade-description">Пассивный доход каждые 5 секунд</span>
                    <span class="upgrade-level" id="farmLevel">Уровень: 0</span>
                    <span class="upgrade-price" id="farmPrice">250 🪙</span>
                </span>
            </button>
        </div>
        <div class="actions">
            <button class="action-btn" id="saveBtn">💾 Сохранить</button>
            <button class="action-btn" id="resetBtn">♻️ Сбросить</button>
        </div>
    </section>

    <footer class="footer">
        Прогресс сохраняется автоматически
    </footer>
</main>

<script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
        tg.ready();
        tg.expand();
        tg.enableClosingConfirmation?.();
    }

    const STORAGE_KEY = "telegram_clicker_save_v2";
    const defaultState = {
        coins: 0,
        power: 1,
        bonusMult: 1,
        autoClickEnabled: false,
        farmEnabled: false,
        
        // Новые уровни для всех предметов
        levelPower: 1,
        levelBonus: 1,
        levelAuto: 0,
        levelFarm: 0,
        
        lastTickTime: Date.now()
    };

    let state = loadState();
    let incomeInterval = null;

    /* --- Элементы DOM --- */
    const scoreEl = document.getElementById("score");
    const powerValueEl = document.getElementById("powerValue");
    const incomeValueEl = document.getElementById("incomeValue");
    const clickBtn = document.getElementById("clickBtn");
    const clickArea = document.getElementById("clickArea");
    
    const buyPower = document.getElementById("buyPower");
    const buyBonus = document.getElementById("buyBonus");
    const buyAuto = document.getElementById("buyAuto");
    const buyFarm = document.getElementById("buyFarm");
    
    const powerPriceEl = document.getElementById("powerPrice");
    const bonusPriceEl = document.getElementById("bonusPrice");
    const autoPriceEl = document.getElementById("autoPrice");
    const farmPriceEl = document.getElementById("farmPrice");
    
    const powerLevelEl = document.getElementById("powerLevel");
    const bonusLevelEl = document.getElementById("bonusLevel");
    const autoLevelEl = document.getElementById("autoLevel");
    const farmLevelEl = document.getElementById("farmLevel");

    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");
    const tabGame = document.getElementById("tabGame");
    const tabShop = document.getElementById("tabShop");
    const viewGame = document.getElementById("viewGame");
    const viewShop = document.getElementById("viewShop");

    /* --- Функции состояния --- */
    function loadState() {
        try {
            const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
            if (!saved) return { ...defaultState };
            
            // Проверяем версию сохранения, чтобы старые сейвы не ломали игру
            if (saved.version !== "v2") return { ...defaultState };

            return {
                ...defaultState,
                coins: Math.max(0, Number(saved.coins) || 0),
                power: Math.max(1, Number(saved.power) || 1),
                bonusMult: Math.max(1, Number(saved.bonusMult) || 1),
                autoClickEnabled: saved.autoClickEnabled === true,
                farmEnabled: saved.farmEnabled === true,
                levelPower: Math.max(1, Number(saved.levelPower) || 1),
                levelBonus: Math.max(1, Number(saved.levelBonus) || 1),
                levelAuto: Math.max(0, Number(saved.levelAuto) || 0),
                levelFarm: Math.max(0, Number(saved.levelFarm) || 0),
                lastTickTime: saved.lastTickTime || Date.now()
            };
        } catch {
            return { ...defaultState };
        }
    }

    function saveState(sendToTelegram = false) {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({...state, version: "v2"}));
        if (sendToTelegram && tg) {
            tg.sendData(JSON.stringify(state));
        }
    }

    function formatNumber(number) {
        return new Intl.NumberFormat("ru-RU").format(number);
    }

    /* --- Расчеты цен --- */
    function getPrice(base, level) {
        // Формула роста цены: base * (1.15 ^ level)
        return Math.floor(base * Math.pow(1.15, level));
    }

    /* --- Обновление интерфейса --- */
    function updateUI() {
        scoreEl.textContent = formatNumber(state.coins);
        powerValueEl.textContent = formatNumber(state.power);
        
        let totalIncome = 0;
        if (state.autoClickEnabled) totalIncome += state.power;
        if (state.farmEnabled) totalIncome += state.levelFarm * 5;
        incomeValueEl.textContent = formatNumber(totalIncome);

        /* Цены и уровни */
        const pricePower = getPrice(50, state.levelPower - 1);
        const priceBonus = getPrice(200, state.levelBonus - 1);
        const priceAuto = getPrice(100, state.levelAuto);
        const priceFarm = getPrice(250, state.levelFarm);

        powerPriceEl.textContent = `${pricePower} 🪙`;
        powerLevelEl.textContent = `Уровень: ${state.levelPower}`;
        buyPower.disabled = state.coins < pricePower;

        bonusPriceEl.textContent = `${priceBonus} 🪙`;
        bonusLevelEl.textContent = `Уровень: ${state.levelBonus}`;
        buyBonus.disabled = state.coins < priceBonus;

        if (state.autoClickEnabled) {
            buyAuto.classList.add("owned");
            buyAuto.disabled = true;
            autoPriceEl.textContent = "ВКЛ";
            autoLevelEl.textContent = `Уровень: ${state.levelAuto}`;
        } else {
            buyAuto.classList.remove("owned");
            buyAuto.disabled = state.coins < priceAuto;
            autoPriceEl.textContent = `${priceAuto} 🪙`;
            autoLevelEl.textContent = `Уровень: ${state.levelAuto}`;
        }

        if (state.farmEnabled) {
            buyFarm.classList.add("owned");
            buyFarm.disabled = true;
            farmPriceEl.textContent = "ВКЛ";
            farmLevelEl.textContent = `Уровень: ${state.levelFarm}`;
        } else {
            buyFarm.classList.remove("owned");
            buyFarm.disabled = state.coins < priceFarm;
            farmPriceEl.textContent = `${priceFarm} 🪙`;
            farmLevelEl.textContent = `Уровень: ${state.levelFarm}`;
        }
    }

    /* --- Игровая логика --- */
    function addCoins(amount) {
        const finalAmount = amount * state.bonusMult;
        state.coins += finalAmount;
        updateUI();
        saveState();
        showFloatingCoins(finalAmount);
    }

    function showFloatingCoins(amount) {
        const element = document.createElement("span");
        element.className = "floating-coin";
        element.textContent = `+${formatNumber(amount)}`; // Исправлено: добавлен $
        const areaRect = clickArea.getBoundingClientRect();
        const buttonRect = clickBtn.getBoundingClientRect();
        element.style.left = `${buttonRect.left - areaRect.left + buttonRect.width / 2 - 15}px`; // Исправлено: добавлен $
        element.style.top = `${buttonRect.top - areaRect.top + buttonRect.height / 2 - 10}px`; // Исправлено: добавлен $
        clickArea.appendChild(element);
        setTimeout(() => element.remove(), 800);
    }

    function processPassiveIncome() {
        const now = Date.now();
        const deltaMs = now - state.lastTickTime;
        state.lastTickTime = now;

        const secondsPassed = deltaMs / 1000;

        if (state.autoClickEnabled) {
            const coinsToAdd = state.power * secondsPassed;
            state.coins += coinsToAdd;
        }

        if (state.farmEnabled) {
            // Ферма срабатывает строго каждые 5 секунд накопленного времени
            // Это позволяет корректно работать фону приложения
            // Для простоты реализации здесь начисляем пропорционально времени
            const farmCoins = state.levelFarm * 5 * secondsPassed;
            state.coins += farmCoins;
        }

        updateUI();
    }

    function startIncomeLoop() {
        stopIncomeLoop();
        incomeInterval = setInterval(processPassiveIncome, 1000);
    }

    function stopIncomeLoop() {
        if (incomeInterval) {
            clearInterval(incomeInterval);
            incomeInterval = null;
        }
    }

    function switchView(showGame) {
        tabGame.classList.toggle("active", showGame);
        tabShop.classList.toggle("active", !showGame);
        viewGame.classList.toggle("active", showGame);
        viewShop.classList.toggle("active", !showGame);
    }

    /* --- Обработчики событий --- */
    clickBtn.addEventListener("click", () => {
        addCoins(state.power);
    });

    buyPower.addEventListener("click", () => {
        const price = getPrice(50, state.levelPower - 1);
        if (state.coins < price) return;
        state.coins -= price;
        state.levelPower++;
        state.power++; 
        updateUI();
        saveState();
    });

    buyBonus.addEventListener("click", () => {
        const price = getPrice(200, state.levelBonus - 1);
        if (state.coins < price) return;
        state.coins -= price;
        state.levelBonus++;
        state.bonusMult += 0.2; // Каждый уровень дает +20% к монете (+0.2x)
        updateUI();
        saveState();
    });

    buyAuto.addEventListener("click", () => {
        const price = getPrice(100, state.levelAuto);
        if (state.autoClickEnabled || state.coins < price) return;
        state.coins -= price;
        state.levelAuto++;
        state.autoClickEnabled = true;
        startIncomeLoop();
        updateUI();
        saveState();
    });

    buyFarm.addEventListener("click", () => {
        const price = getPrice(250, state.levelFarm);
        if (state.farmEnabled || state.coins < price) return;
        state.coins -= price;
        state.levelFarm++;
        state.farmEnabled = true;
        startIncomeLoop();
        updateUI();
        saveState();
    });

    tabGame.addEventListener("click", () => switchView(true));
    tabShop.addEventListener("click", () => switchView(false));

    saveBtn.addEventListener("click", () => {
        saveState(true);
        const oldText = saveBtn.textContent;
        saveBtn.textContent = "✅ Отправлено";
        setTimeout(() => { saveBtn.textContent = oldText; }, 1200);
    });

    resetBtn.addEventListener("click", () => {
        const confirmed = confirm("Точно сбросить весь прогресс?");
        if (!confirmed) return;
        stopIncomeLoop();
        state = { ...defaultState };
        saveState();
        updateUI();
    });

    document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") {
            saveState();
        }
    });

    window.addEventListener("beforeunload", () => {
        saveState();
    });

    /* --- Инициализация --- */
    updateUI();
    if (state.autoClickEnabled || state.farmEnabled) {
        startIncomeLoop();
    }
</script>
</body>
</html>
