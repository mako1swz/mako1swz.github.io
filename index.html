<title>Кликер PRO</title>

<style>:root {
--bg: var(--tg-theme-bg-color, #111114);
--secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c20);
--text: var(--tg-theme-text-color, #ffffff);
--hint: var(--tg-theme-hint-color, #98989f);
--button: var(--tg-theme-button-color, #ff9f0a);
--button-text: var(--tg-theme-button-text-color, #000000);
--card: rgba(255, 255, 255, 0.08);
--success: #30d158;
--danger: #ff453a;
--border: rgba(255, 255, 255, 0.1);
}

* {
box-sizing: border-box;
-webkit-tap-highlight-color: transparent;
}

body {
margin: 0;
min-height: 100vh;
padding: 16px;
overflow-x: hidden;
color: var(--text);
background:
radial-gradient(circle at top, rgba(255, 159, 10, 0.14), transparent 34%),
var(--bg);
font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}.app {
width: 100%;
max-width: 420px;
min-height: calc(100vh - 32px);
margin: auto;
display: flex;
flex-direction: column;
}.header {
text-align: center;
margin: 12px 0 20px;
}.header h1 {
margin: 0 0 6px;
font-size: 25px;
}.header p {
margin: 0;
color: var(--hint);
font-size: 14px;
}.tabs {
display: flex;
gap: 8px;
padding: 5px;
margin-bottom: 20px;
border-radius: 16px;
background: var(--card);
border: 1px solid var(--border);
}.tab-btn {
flex: 1;
border: 0;
border-radius: 12px;
padding: 12px;
color: var(--hint);
background: transparent;
font-size: 15px;
font-weight: 600;
cursor: pointer;
transition: 0.2s ease;
}.tab-btn.active {
color: var(--button-text);
background: var(--button);
box-shadow: 0 5px 18px rgba(255, 159, 10, 0.25);
}.view {
display: none;
animation: fadeIn 0.2s ease;
}.view.active {
display: block;
}.stats-card {
padding: 20px;
text-align: center;
border-radius: 22px;
background: var(--card);
border: 1px solid var(--border);
box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
}.coins-label {
color: var(--hint);
font-size: 14px;
margin-bottom: 5px;
}

#score {
font-size: clamp(45px, 16vw, 72px);
line-height: 1;
font-weight: 800;
letter-spacing: -2px;
word-break: break-word;
}.stats {
display: flex;
justify-content: center;
gap: 24px;
margin-top: 16px;
}.stat {
display: flex;
flex-direction: column;
gap: 3px;
}.stat strong {
font-size: 17px;
}.stat span {
color: var(--hint);
font-size: 12px;
}.click-area {
position: relative;
display: flex;
justify-content: center;
align-items: center;
min-height: 280px;
}

#clickBtn {
width: min(68vw, 230px);
height: min(68vw, 230px);
max-width: 230px;
max-height: 230px;
border: none;
border-radius: 50%;
color: var(--button-text);
background: linear-gradient(145deg, var(--button), #ff7b00);
font-size: 25px;
font-weight: 800;
cursor: pointer;
user-select: none;
box-shadow:
0 15px 35px rgba(255, 159, 10, 0.3),
inset 0 -8px 0 rgba(0, 0, 0, 0.12);
transition: transform 0.1s ease, filter 0.2s ease;
}

#clickBtn:active {
transform: scale(0.93);
filter: brightness(0.9);
}.floating-coin {
position: absolute;
pointer-events: none;
color: var(--button);
font-weight: 800;
font-size: 20px;
animation: floatUp 0.8s ease-out forwards;
}.section-title {
margin: 0 0 12px;
font-size: 20px;
}.shop-container {
display: flex;
flex-direction: column;
gap: 10px;
}.upgrade-btn,.action-btn {
width: 100%;
padding: 15px;
border: 1px solid var(--border);
border-radius: 15px;
color: var(--text);
background: var(--card);
text-align: left;
cursor: pointer;
transition: 0.2s ease;
}.upgrade-btn {
display: flex;
align-items: center;
gap: 12px;
}.upgrade-btn:not(:disabled):active,.action-btn:active {
transform: scale(0.98);
}.upgrade-btn:disabled {
opacity: 0.42;
cursor: not-allowed;
}.upgrade-icon {
width: 42px;
height: 42px;
flex: 0 0 42px;
display: grid;
place-items: center;
border-radius: 12px;
background: rgba(255, 159, 10, 0.18);
font-size: 21px;
}.upgrade-info {
flex: 1;
}.upgrade-title {
display: block;
margin-bottom: 4px;
font-size: 15px;
font-weight: 700;
}.upgrade-description {
display: block;
color: var(--hint);
font-size: 12px;
}.upgrade-price {
color: var(--button);
font-size: 13px;
font-weight: 800;
white-space: nowrap;
}.upgrade-level {
color: var(--success);
font-size: 11px;
font-weight: 600;
margin-left: 6px;
}.action-btn {
text-align: center;
font-size: 13px;
font-weight: 600;
margin-top: 20px;
border-color: var(--border);
}.footer {
margin-top: auto;
padding-top: 20px;
text-align: center;
color: var(--hint);
font-size: 11px;
}

@keyframes floatUp {
0% {
opacity: 1;
transform: translateY(0) scale(1);
}

100% {
opacity: 0;
transform: translateY(-75px) scale(1.25);
}
}

@keyframes fadeIn {
from {
opacity: 0;
transform: translateY(4px);
}

to {
opacity: 1;
transform: translateY(0);
}
}

@media (max-height: 650px) {.header {
margin: 4px 0 12px;
}

<body>
<main class="app">
<!-- Секции игры и магазина (HTML структура остается прежней, добавляем контейнер для магазина) -->
<header class="header">
<h1>🪙 Кликер PRO</h1>
<p>Кликай и строй бизнес</p>

<script>
const tg = window.Telegram?.WebApp;

if (tg) {
tg.ready();
tg.expand();
tg.enableClosingConfirmation?.();
}

const STORAGE_KEY = "telegram_clicker_save_v2";

// Конфигурация магазина
const SHOP_ITEMS = [
{ id: 'cursor', name: 'Курсор', basePrice: 15, power: 0.1, icon: '👆' },
{ id: 'pickaxe', name: 'Кирка', basePrice: 50, power: 0.5, icon: '⛏️' },
{ id: 'drill', name: 'Бур', basePrice: 200, power: 2.0, icon: '🔩' },
{ id: 'factory', name: 'Фабрика', basePrice: 1000, power: 8.0, icon: '🏭' }
];

// Базовое состояние: монеты, базовая сила клика, и объект с уровнями улучшений
const defaultState = {
coins: 0,
power: 1,
upgrades: {} // { cursor: 1, pickaxe: 0,... }
};

// Инициализация уровней улучшений при старте, если их нет
SHOP_ITEMS.forEach(item => {
if (typeof defaultState.upgrades[item.id]!== 'number') {
defaultState.upgrades[item.id] = 0;
}
});

let state = loadState();
let autoInterval = null;
let incomeInterval = null;

// DOM элементы
const scoreEl = document.getElementById("score");
const powerValueEl = document.getElementById("powerValue");
const incomeValueEl = document.getElementById("incomeValue");
const clickBtn = document.getElementById("clickBtn");
const clickArea = document.getElementById("clickArea");
const shopListEl = document.getElementById("shopList");
const buyPower = document.getElementById("buyPower"); // Старая кнопка силы (упростим, оставим для базовой силы)
const powerPriceEl = document.getElementById("powerPrice");
const buyAuto = document.getElementById("buyAuto");
const autoPriceEl = document.getElementById("autoPrice");
const resetBtn = document.getElementById("resetBtn");
const tabGame = document.getElementById("tabGame");
const tabShop = document.getElementById("tabShop");
const viewGame = document.getElementById("viewGame");
const viewShop = document.getElementById("viewShop");

function loadState() {
try {
const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
if (!saved) return JSON.parse(JSON.stringify(defaultState));

// Слияние состояния, чтобы не сломать новые поля
const loaded = {
coins: Math.max(0, Number(saved.coins) || 0),
power: Math.max(1, Number(saved.power) || 1),
upgrades: {}
};

SHOP_ITEMS.forEach(item => {
loaded.upgrades[item.id] = saved.upgrades && typeof saved.upgrades[item.id] === 'number'? saved.upgrades[item.id]: 0;
});
return loaded;
} catch (e) {
console.error("Ошибка загрузки", e);
return JSON.parse(JSON.stringify(defaultState));
}
}

function saveState(sendToTelegram = false) {
localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
if (sendToTelegram && tg) {
tg.sendData(JSON.stringify(state));
}
}

function formatNumber(number) {
return new Intl.NumberFormat("ru-RU").format(number);
}

// Получить цену с учетом уровня: База * (1.15 ^ Уровень)
function getCurrentPrice(item) {
const level = state.upgrades[item.id];
return Math.floor(item.basePrice * Math.pow(1.15, level));
}

// Подсчет общего дохода в секунду
function calculateTotalIncome() {
let income = 0;
SHOP_ITEMS.forEach(item => {
income += item.power * state.upgrades[item.id];
});
return income;
}

function updateUI() {
// Обновление баланса
scoreEl.textContent = formatNumber(Math.floor(state.coins));

// Обновление силы клика
powerValueEl.textContent = formatNumber(state.power);

// Обновление дохода в секунду
const totalIncome = calculateTotalIncome();
incomeValueEl.textContent = formatNumber(totalIncome);

// Активация автокликера (если есть доход от улучшений)
const autoEnabled = totalIncome > 0;
if (autoEnabled &&!incomeInterval) {
startIncomeGenerator(totalIncome);
} else if (!autoEnabled && incomeInterval) {
stopIncomeGenerator();
}

// Обновление кнопки базовой силы (Клик)
if (buyPower) {
const powerPrice = state.power * 10; // Увеличение силы стоит в 10 раз больше текущей силы
powerPriceEl.textContent = `${formatNumber(powerPrice)} 🪙`;
buyPower.disabled = state.coins < powerPrice;
}

// Обновление кнопки Банка (опционально, для автосейва)
if (autoEnabled && buyAuto) {
buyAuto.classList.add("owned");
buyAuto.disabled = true;
autoPriceEl.textContent = `Активен (${formatNumber(totalIncome)}/с)`;
} else if (buyAuto) {
buyAuto.classList.remove("owned");
buyAuto.disabled = state.coins < 1000; // фиксированная цена для старта
autoPriceEl.textContent = "1000 🪙";
}

renderShop();
}

// Отрисовка списка магазина
function renderShop() {
shopListEl.innerHTML = ''; // Очистка

SHOP_ITEMS.forEach(item => {
const currentLevel = state.upgrades[item.id];
const currentPrice = getCurrentPrice(item);
const isOwned = currentLevel > 0;

const btn = document.createElement("button");
btn.className = `upgrade-btn ${isOwned? 'owned': ''}`;
btn.disabled = state.coins < currentPrice;

btn.innerHTML = `
<span class="upgrade-icon">${item.icon}</span>
<span class="upgrade-info">
<span class="upgrade-title">${item.name} <span class="upgrade-level">Ур. ${currentLevel}</span></span>
<span class="upgrade-description">
+${item.power} монет/с за уровень
</span>
</span>
<span class="upgrade-price">${formatNumber(currentPrice)} 🪙</span>
`;

btn.onclick = () => buyItem(item.id);
shopListEl.appendChild(btn);
});
}

function buyItem(id) {
const item = SHOP_ITEMS.find(i => i.id === id);
const price = getCurrentPrice(item);

if (state.coins >= price) {
state.coins -= price;
state.upgrades[item.id]++;

// Увеличиваем базовую силу клика небольшим бонусом
state.power += (item.power / 10);

saveState();
updateUI();
}
}

// Генерация дохода
function startIncomeGenerator(amount) {
if (incomeInterval) return;
incomeInterval = setInterval(() => {
if (state.coins < Number.MAX_SAFE_INTEGER) {
state.coins += amount;
updateUI(); // Обновляем UI (цену и баланс) в реальном времени
}
}, 1000);
}

function stopIncomeGenerator() {
if (incomeInterval) {
clearInterval(incomeInterval);
incomeInterval = null;
}
}

// Управление UI кнопки Клик
if (buyPower) {
buyPower.addEventListener("click", () => {
const powerPrice = Math.floor(state.power * 10);
if (state.coins >= powerPrice) {
state.coins -= powerPrice;
state.power
