<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>Кликер</title>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #111114);
      --secondary-bg: var(--tg-theme-secondary-bg-color, #1c1c20);
      --text: var(--tg-theme-text-color, #ffffff);
      --hint: var(--tg-theme-hint-color, #98989f);
      --button: var(--tg-theme-button-color, #ff9f0a);
      --button-text: var(--tg-theme-button-text-color, #000000);
      --card: rgba(255, 255, 255, 0.08);
      --success: #30d158;
      --danger: #ff453a;
      --border: rgba(255, 255, 255, 0.1);
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 16px;
      overflow-x: hidden;
      color: var(--text);
      background:
        radial-gradient(circle at top, rgba(255, 159, 10, 0.14), transparent 34%),
        var(--bg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: 100%;
      max-width: 420px;
      min-height: calc(100vh - 32px);
      margin: auto;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin: 12px 0 20px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 25px;
    }

    .header p {
      margin: 0;
      color: var(--hint);
      font-size: 14px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 5px;
      margin-bottom: 20px;
      border-radius: 16px;
      background: var(--card);
      border: 1px solid var(--border);
    }

    .tab-btn {
      flex: 1;
      border: 0;
      border-radius: 12px;
      padding: 12px;
      color: var(--hint);
      background: transparent;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .tab-btn.active {
      color: var(--button-text);
      background: var(--button);
      box-shadow: 0 5px 18px rgba(255, 159, 10, 0.25);
    }

    .view {
      display: none;
      animation: fadeIn 0.2s ease;
    }

    .view.active {
      display: block;
    }

    .stats-card {
      padding: 20px;
      text-align: center;
      border-radius: 22px;
      background: var(--card);
      border: 1px solid var(--border);
      box-shadow: 0 12px 35px rgba(0, 0, 0, 0.18);
    }

    .coins-label {
      color: var(--hint);
      font-size: 14px;
      margin-bottom: 5px;
    }

    #score {
      font-size: clamp(45px, 16vw, 72px);
      line-height: 1;
      font-weight: 800;
      letter-spacing: -2px;
      word-break: break-word;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 16px;
    }

    .stat {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .stat strong {
      font-size: 17px;
    }

    .stat span {
      color: var(--hint);
      font-size: 12px;
    }

    .click-area {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 280px;
    }

    #clickBtn {
      width: min(68vw, 230px);
      height: min(68vw, 230px);
      max-width: 230px;
      max-height: 230px;
      border: none;
      border-radius: 50%;
      color: var(--button-text);
      background: linear-gradient(145deg, var(--button), #ff7b00);
      font-size: 25px;
      font-weight: 800;
      cursor: pointer;
      user-select: none;
      box-shadow:
        0 15px 35px rgba(255, 159, 10, 0.3),
        inset 0 -8px 0 rgba(0, 0, 0, 0.12);
      transition: transform 0.1s ease, filter 0.2s ease;
    }

    #clickBtn:active {
      transform: scale(0.93);
      filter: brightness(0.9);
    }

    .floating-coin {
      position: absolute;
      pointer-events: none;
      color: var(--button);
      font-weight: 800;
      font-size: 20px;
      animation: floatUp 0.8s ease-out forwards;
    }

    .section-title {
      margin: 0 0 12px;
      font-size: 20px;
    }

    .shop-container {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .upgrade-btn,
    .action-btn {
      width: 100%;
      padding: 15px;
      border: 1px solid var(--border);
      border-radius: 15px;
      color: var(--text);
      background: var(--card);
      text-align: left;
      cursor: pointer;
      transition: 0.2s ease;
    }

    .upgrade-btn {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .upgrade-btn:not(:disabled):active,
    .action-btn:active {
      transform: scale(0.98);
    }

    .upgrade-btn:disabled {
      opacity: 0.42;
      cursor: not-allowed;
    }

    .upgrade-icon {
      width: 42px;
      height: 42px;
      flex: 0 0 42px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: rgba(255, 159, 10, 0.18);
      font-size: 21px;
    }

    .upgrade-info {
      flex: 1;
    }

    .upgrade-title {
      display: block;
      margin-bottom: 4px;
      font-size: 15px;
      font-weight: 700;
    }

    .upgrade-description {
      display: block;
      color: var(--hint);
      font-size: 12px;
    }

    .upgrade-price {
      color: var(--button);
      font-size: 13px;
      font-weight: 800;
      white-space: nowrap;
    }

    .upgrade-btn.owned {
      border-color: rgba(48, 209, 88, 0.4);
      background: rgba(48, 209, 88, 0.12);
    }

    .upgrade-btn.owned .upgrade-price {
      color: var(--success);
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }

    .action-btn {
      text-align: center;
      font-size: 13px;
      font-weight: 600;
    }

    .footer {
      margin-top: auto;
      padding-top: 20px;
      text-align: center;
      color: var(--hint);
      font-size: 11px;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }

      100% {
        opacity: 0;
        transform: translateY(-75px) scale(1.25);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(4px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-height: 650px) {
      .header {
        margin: 4px 0 12px;
      }

      .click-area {
        min-height: 220px;
      }

      .stats-card {
        padding: 14px;
      }
    }
  </style>
</head>

<body>
  <main class="app">
    <header class="header">
      <h1>🪙 Кликер</h1>
      <p>Кликай и покупай улучшения</p>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" id="tabGame">Игра</button>
      <button class="tab-btn" id="tabShop">Магазин</button>
    </nav>

    <section id="viewGame" class="view active">
      <div class="stats-card">
        <div class="coins-label">Твои монеты</div>
        <div id="score">0</div>

        <div class="stats">
          <div class="stat">
            <strong id="powerValue">1</strong>
            <span>за клик</span>
          </div>

          <div class="stat">
            <strong id="incomeValue">0</strong>
            <span>в секунду</span>
          </div>
        </div>
      </div>

      <div class="click-area" id="clickArea">
        <button id="clickBtn">КЛИК</button>
      </div>
    </section>

    <section id="viewShop" class="view">
      <h2 class="section-title">Улучшения</h2>

      <div class="shop-container">
        <button class="upgrade-btn" id="buyPower">
          <span class="upgrade-icon">⚡</span>

          <span class="upgrade-info">
            <span class="upgrade-title">Сила клика</span>
            <span class="upgrade-description">
              Увеличивает доход за один клик
            </span>
          </span>

          <span class="upgrade-price" id="powerPrice">50 🪙</span>
        </button>

        <button class="upgrade-btn" id="buyAuto">
          <span class="upgrade-icon">🤖</span>

          <span class="upgrade-info">
            <span class="upgrade-title">Автокликер</span>
            <span class="upgrade-description">
              Приносит монеты каждую секунду
            </span>
          </span>

          <span class="upgrade-price" id="autoPrice">100 🪙</span>
        </button>
      </div>

      <div class="actions">
        <button class="action-btn" id="saveBtn">💾 Сохранить</button>
        <button class="action-btn" id="resetBtn">♻️ Сбросить</button>
      </div>
    </section>

    <footer class="footer">
      Прогресс сохраняется автоматически
    </footer>
  </main>

  <script>
    const tg = window.Telegram?.WebApp;

    if (tg) {
      tg.ready();
      tg.expand();
      tg.enableClosingConfirmation?.();
    }

    const STORAGE_KEY = "telegram_clicker_save";

    const defaultState = {
      coins: 0,
      power: 1,
      autoClickEnabled: false
    };

    let state = loadState();
    let autoInterval = null;

    const scoreEl = document.getElementById("score");
    const powerValueEl = document.getElementById("powerValue");
    const incomeValueEl = document.getElementById("incomeValue");

    const clickBtn = document.getElementById("clickBtn");
    const clickArea = document.getElementById("clickArea");

    const buyPower = document.getElementById("buyPower");
    const buyAuto = document.getElementById("buyAuto");

    const powerPriceEl = document.getElementById("powerPrice");
    const autoPriceEl = document.getElementById("autoPrice");

    const saveBtn = document.getElementById("saveBtn");
    const resetBtn = document.getElementById("resetBtn");

    const tabGame = document.getElementById("tabGame");
    const tabShop = document.getElementById("tabShop");

    const viewGame = document.getElementById("viewGame");
    const viewShop = document.getElementById("viewShop");

    function loadState() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));

        if (!saved) {
          return { ...defaultState };
        }

        return {
          coins: Math.max(0, Number(saved.coins) || 0),
          power: Math.max(1, Number(saved.power) || 1),
          autoClickEnabled: saved.autoClickEnabled === true
        };
      } catch {
        return { ...defaultState };
      }
    }

    function saveState(sendToTelegram = false) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));

      if (sendToTelegram && tg) {
        tg.sendData(JSON.stringify(state));
      }
    }

    function formatNumber(number) {
      return new Intl.NumberFormat("ru-RU").format(number);
    }

    function updateUI() {
      scoreEl.textContent = formatNumber(state.coins);
      powerValueEl.textContent = formatNumber(state.power);
      incomeValueEl.textContent = state.autoClickEnabled
        ? formatNumber(state.power)
        : "0";

      powerPriceEl.textContent = "50 🪙";
      buyPower.disabled = state.coins < 50;

      if (state.autoClickEnabled) {
        buyAuto.classList.add("owned");
        buyAuto.disabled = true;
        autoPriceEl.textContent = "ВКЛ";
      } else {
        buyAuto.classList.remove("owned");
        buyAuto.disabled = state.coins < 100;
        autoPriceEl.textContent = "100 🪙";
      }
    }

    function addCoins(amount) {
      state.coins += amount;
      updateUI();
      saveState();
    }

    function showFloatingCoins(amount) {
      const element = document.createElement("span");

      element.className = "floating-coin";
      element.textContent = `+${amount}`;

      const areaRect = clickArea.getBoundingClientRect();
      const buttonRect = clickBtn.getBoundingClientRect();

      element.style.left =
        `${buttonRect.left - areaRect.left + buttonRect.width / 2 - 15}px`;

      element.style.top =
        `${buttonRect.top - areaRect.top + buttonRect.height / 2 - 10}px`;

      clickArea.appendChild(element);

      setTimeout(() => element.remove(), 800);
    }

    function startAutoClicker() {
      stopAutoClicker();

      if (!state.autoClickEnabled) {
        return;
      }

      autoInterval = setInterval(() => {
        addCoins(state.power);
      }, 1000);
    }

    function stopAutoClicker() {
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
      }
    }

    function switchView(showGame) {
      tabGame.classList.toggle("active", showGame);
      tabShop.classList.toggle("active", !showGame);

      viewGame.classList.toggle("active", showGame);
      viewShop.classList.toggle("active", !showGame);
    }

    clickBtn.addEventListener("click", () => {
      addCoins(state.power);
      showFloatingCoins(state.power);
    });

    buyPower.addEventListener("click", () => {
      if (state.coins < 50) return;

      state.coins -= 50;
      state.power += 1;

      updateUI();
      saveState();
    });

    buyAuto.addEventListener("click", () => {
      if (state.autoClickEnabled || state.coins < 100) return;

      state.coins -= 100;
      state.autoClickEnabled = true;

      startAutoClicker();
      updateUI();
      saveState();
    });

    tabGame.addEventListener("click", () => switchView(true));
    tabShop.addEventListener("click", () => switchView(false));

    saveBtn.addEventListener("click", () => {
      saveState(true);

      const oldText = saveBtn.textContent;
      saveBtn.textContent = "✅ Отправлено";

      setTimeout(() => {
        saveBtn.textContent = oldText;
      }, 1200);
    });

    resetBtn.addEventListener("click", () => {
      const confirmed = confirm("Точно сбросить весь прогресс?");

      if (!confirmed) return;

      stopAutoClicker();
      state = { ...defaultState };

      saveState();
      updateUI();
    });

    document.addEventListener("visibilitychange", () => {
      if (document.visibilityState === "hidden") {
        saveState();
      }
    });

    window.addEventListener("beforeunload", () => {
      saveState();
    });

    updateUI();

    if (state.autoClickEnabled) {
      startAutoClicker();
    }
  </script>
</body>
</html>
