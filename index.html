<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Кликер</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      :root {
        --bg: var(--tg-theme-bg-color, #1c1c1e);
        --text: var(--tg-theme-text-color, #ffffff);
        --btn: var(--tg-theme-button-color, #ff9f0a);
        --btn-text: var(--tg-theme-button-text-color, #000000);
        --secondary: #333335;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
        overflow: hidden;
        padding: 16px;
        box-sizing: border-box;
      }

      /* Вкладки */
      .tabs {
        width: 100%;
        max-width: 320px;
        display: flex;
        gap: 8px;
        margin-bottom: 24px;
      }
      .tab-btn {
        flex: 1;
        border: none;
        background: rgba(255,255,255,0.08);
        color: var(--text);
        padding: 12px;
        border-radius: 12px;
        font-size: 15px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .tab-btn.active {
        background: var(--btn);
        color: var(--btn-text);
      }
      .tab-btn:active { transform: scale(0.96); }

      #score {
        font-size: 64px;
        font-weight: bold;
        margin-bottom: 16px;
      }
      .label { color: #aaaaaa; margin-bottom: 32px; }
      button#clickBtn {
        width: 200px;
        height: 200px;
        border-radius: 50%;
        border: none;
        background-color: var(--btn);
        color: var(--btn-text);
        font-size: 28px;
        cursor: pointer;
        box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        user-select: none;
        transition: transform 0.1s;
      }
      button#clickBtn:active { transform: scale(0.96); }

      .shop-container {
        width: 100%;
        max-width: 320px;
      }
      .upgrade-btn {
        width: 100%;
        background: var(--secondary);
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        margin-bottom: 8px;
        font-size: 15px;
        text-align: left;
      }
      .upgrade-btn:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      .upgrade-price {
        float: right;
        font-weight: bold;
      }

      /* Скрытие неактивных экранов */
      .view { display: none; text-align: center; }
      .view.active { display: block; }
    </style>
  </head>
  <body>
    <!-- Вкладки -->
    <div class="tabs">
      <button class="tab-btn active" id="tabGame">Игра</button>
      <button class="tab-btn" id="tabShop">Магазин</button>
    </div>

    <!-- Экран игры -->
    <div id="viewGame" class="view active">
      <div id="score">0</div>
      <div class="label">Монет: <span id="coins">0</span></div>
      <button id="clickBtn">КЛИК</button>
    </div>

    <!-- Экран магазина -->
    <div id="viewShop" class="view">
      <div class="shop-container">
        <h3>Улучшения</h3>
        <button class="upgrade-btn" id="buyAuto">Автокликер (100 монет)</button>
        <button class="upgrade-btn" id="buyPower">Сила клика +1 (50 монет)</button>
      </div>
    </div>

    <script>
      const tg = window.Telegram.WebApp;
      tg.ready();
      tg.expand();

      // Загрузка сохранений
      let coins = parseInt(localStorage.getItem('clicker_coins')) || 0;
      let power = parseInt(localStorage.getItem('clicker_power')) || 1;
      let autoClickEnabled = localStorage.getItem('clicker_auto') === 'true';
      let autoInterval = null;

      const scoreEl = document.getElementById('score');
      const coinsEl = document.getElementById('coins');
      const btn = document.getElementById('clickBtn');
      const buyAuto = document.getElementById('buyAuto');
      const buyPower = document.getElementById('buyPower');

      // Вкладки
      const tabGame = document.getElementById('tabGame');
      const tabShop = document.getElementById('tabShop');
      const viewGame = document.getElementById('viewGame');
      const viewShop = document.getElementById('viewShop');

      function save() {
        localStorage.setItem('clicker_coins', coins);
        localStorage.setItem('clicker_power', power);
        localStorage.setItem('clicker_auto', autoClickEnabled);

        // Отправляем прогресс боту
        tg.sendData(JSON.stringify({ coins, power, autoClickEnabled }));
      }

      function updateUI() {
        scoreEl.textContent = coins;
        coinsEl.textContent = coins;

        // Логика кнопки автокликера
        if (autoClickEnabled) {
          buyAuto.textContent = 'Автокликер: ВКЛ';
          buyAuto.style.background = '#4caf50';
          buyAuto.disabled = true;
        } else {
          buyAuto.textContent = `Автокликер (${100} монет)`;
          buyAuto.style.background = '';
          buyAuto.disabled = coins < 100;
        }

        // Логика кнопки силы клика
        buyPower.textContent = `Сила клика: ${power} (следующее: 50 монет)`;
        buyPower.disabled = coins < 50;
      }

      updateUI();

      btn.addEventListener('click', () => {
        coins += power;
        updateUI();
        save();
      });

      buyAuto.addEventListener('click', () => {
        if (!autoClickEnabled && coins >= 100) {
          coins -= 100;
          autoClickEnabled = true;
          startAutoClick();
          updateUI();
          save();
        }
      });

      buyPower.addEventListener('click', () => {
        if (coins >= 50) {
          coins -= 50;
          power++;
          updateUI();
          save();
        }
      });

      function startAutoClick() {
        clearInterval(autoInterval);
        autoInterval = setInterval(() => {
          if (autoClickEnabled) {
            coins += power;
            updateUI();
            save();
          }
        }, 1000);
      }

      if (autoClickEnabled) {
        startAutoClick();
      }

      // Переключение вкладок
      function switchView(isGame) {
        if (isGame) {
          tabGame.classList.add('active');
          tabShop.classList.remove('active');
          viewGame.classList.add('active');
          viewShop.classList.remove('active');
        } else {
          tabGame.classList.remove('active');
          tabShop.classList.add('active');
          viewGame.classList.remove('active');
          viewShop.classList.add('active');
        }
      }

      tabGame.addEventListener('click', () => switchView(true));
      tabShop.addEventListener('click', () => switchView(false));
    </script>
  </body>
</html>
