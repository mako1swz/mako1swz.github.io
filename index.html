<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta charset="UTF-8" />
  <title>Кликер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #111216);
      --text: var(--tg-theme-text-color, #ffffff);
      --btn: var(--tg-theme-button-color, #ff9f0a);
      --btn-text: var(--tg-theme-button-text-color, #000000);
      --secondary: var(--tg-theme-secondary-bg-color, #1c1f26);
      --border: var(--tg-theme-hint-color, #2f3440);
      --accent: #ff9f0a;
      --success: #4caf50;
      --danger: #ff5252;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,159,10,0.14), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 420px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding-bottom: 24px;
    }

    #score {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      margin-top: 12px;
      text-shadow: 0 0 24px rgba(255,159,10,0.18);
    }

    .label {
      color: #a9a9b2;
      font-size: 14px;
      text-align: center;
      margin-top: -8px;
    }

    .stats-panel,
    .shop-container {
      width: 100%;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }

    .stats-panel {
      padding: 16px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-item {
      text-align: center;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
    }

    .stat-label {
      font-size: 11px;
      color: #8c8c95;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-weight: 800;
      font-size: 24px;
      color: var(--accent);
    }

    #clickBtn {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 30% 30%, #ffd08a, var(--btn));
      color: var(--btn-text);
      font-size: 34px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.42);
      user-select: none;
      transition: transform 0.08s ease, box-shadow 0.2s ease, filter 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    #clickBtn:active {
      transform: scale(0.94);
      filter: brightness(1.05);
    }

    #clickBtn.autopulse {
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.45), 0 16px 40px rgba(0,0,0,0.42); }
      70% { box-shadow: 0 0 0 18px rgba(76, 175, 80, 0), 0 16px 40px rgba(0,0,0,0.42); }
      100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0), 0 16px 40px rgba(0,0,0,0.42); }
    }

    .shop-container {
      padding: 16px;
    }

    .shop-title {
      margin: 0 0 12px 0;
      font-size: 18px;
      font-weight: 700;
      text-align: center;
    }

    .upgrade-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .upgrade-row:last-child {
      border-bottom: none;
    }

    .upgrade-info {
      min-width: 0;
    }

    .upgrade-name {
      display: block;
      font-weight: 700;
      font-size: 15px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .upgrade-desc {
      display: block;
      font-size: 12px;
      color: #a0a0aa;
      margin-top: 3px;
    }

    .upgrade-actions {
      min-width: 110px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .upgrade-price {
      font-weight: 800;
      font-size: 15px;
      color: var(--accent);
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--success), #7be57f);
      transition: width 0.25s ease;
    }

    .buy-btn {
      border: none;
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.2s ease, background 0.2s ease;
      min-width: 92px;
    }

    .buy-btn:hover {
      opacity: 0.95;
    }

    .buy-btn:active {
      transform: scale(0.97);
    }

    .buy-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .float-number {
      position: fixed;
      pointer-events: none;
      font-weight: 800;
      color: var(--accent);
      font-size: 24px;
      animation: floatUp 0.9s forwards;
      z-index: 999;
      text-shadow: 0 0 12px rgba(255,159,10,0.25);
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.35); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="score">0</div>
    <div class="label">Монет: <span id="coins">0</span></div>

    <div class="stats-panel">
      <div class="stat-item">
        <div class="stat-label">Сила клика</div>
        <div class="stat-value" id="statPower">1</div>
      </div>
      <div class="stat-item">
        <div class="stat-label">Доход/сек</div>
        <div class="stat-value" id="statPerSec">0</div>
      </div>
    </div>

    <button id="clickBtn">КЛИК</button>

    <div class="shop-container">
      <h3 class="shop-title">Магазин улучшений</h3>

      <div class="upgrade-row">
        <div class="upgrade-info">
          <span class="upgrade-name">Сила клика +1</span>
          <span class="upgrade-desc">Каждый клик будет приносить больше монет</span>
        </div>
        <div class="upgrade-actions">
          <span class="upgrade-price" id="pricePower">50</span>
          <div class="progress-bar"><div class="progress-fill" id="progPower"></div></div>
          <button class="buy-btn" id="btnBuyPower">Купить</button>
        </div>
      </div>

      <div class="upgrade-row">
        <div class="upgrade-info">
          <span class="upgrade-name">Автокликер</span>
          <span class="upgrade-desc">Даёт доход автоматически каждую секунду</span>
        </div>
        <div class="upgrade-actions">
          <span class="upgrade-price" id="priceAuto">100</span>
          <div class="progress-bar"><div class="progress-fill" id="progAuto"></div></div>
          <button class="buy-btn" id="btnBuyAuto">Купить</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const LS_KEYS = {
      coins: 'clicker_coins',
      power: 'clicker_power',
      auto: 'clicker_auto'
    };

    let coins = Number(localStorage.getItem(LS_KEYS.coins) || 0);
    let power = Number(localStorage.getItem(LS_KEYS.power) || 1);
    let autoEnabled = localStorage.getItem(LS_KEYS.auto) === 'true';
    let autoInterval = null;

    const scoreEl = document.getElementById('score');
    const coinsEl = document.getElementById('coins');
    const statPowerEl = document.getElementById('statPower');
    const statPerSecEl = document.getElementById('statPerSec');
    const clickBtn = document.getElementById('clickBtn');

    const btnBuyPower = document.getElementById('btnBuyPower');
    const pricePowerEl = document.getElementById('pricePower');
    const progPowerEl = document.getElementById('progPower');

    const btnBuyAuto = document.getElementById('btnBuyAuto');
    const priceAutoEl = document.getElementById('priceAuto');
    const progAutoEl = document.getElementById('progAuto');

    function getPowerCost() {
      return Math.floor(50 * Math.pow(1.35, power - 1));
    }

    function getAutoPerSec() {
      return autoEnabled ? power : 0;
    }

    function save() {
      localStorage.setItem(LS_KEYS.coins, String(coins));
      localStorage.setItem(LS_KEYS.power, String(power));
      localStorage.setItem(LS_KEYS.auto, String(autoEnabled));

      if (tg?.sendData) {
        tg.sendData(JSON.stringify({ coins, power, autoEnabled }));
      }
    }

    function updateUI() {
      scoreEl.textContent = coins;
      coinsEl.textContent = coins;
      statPowerEl.textContent = power;
      statPerSecEl.textContent = getAutoPerSec();

      const costPower = getPowerCost();
      pricePowerEl.textContent = costPower;
      progPowerEl.style.width = Math.min(100, (coins / costPower) * 100) + '%';
      btnBuyPower.disabled = coins < costPower;

      const costAuto = 100;
      priceAutoEl.textContent = costAuto;
      progAutoEl.style.width = Math.min(100, (coins / costAuto) * 100) + '%';
      btnBuyAuto.disabled = coins < costAuto || autoEnabled;
      btnBuyAuto.textContent = autoEnabled ? 'ВКЛ' : 'Купить';
      btnBuyAuto.style.background = autoEnabled ? 'var(--success)' : '';
      btnBuyAuto.style.color = autoEnabled ? '#000' : '';

      clickBtn.classList.toggle('autopulse', autoEnabled);
    }

    function createFloatNumber(amount, x, y) {
      const el = document.createElement('div');
      el.className = 'float-number';
      el.textContent = '+' + amount;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    function startAutoClick() {
      clearInterval(autoInterval);
      autoInterval = setInterval(() => {
        if (!autoEnabled) return;
        coins += power;
        save();
        updateUI();
      }, 1000);
    }

    clickBtn.addEventListener('click', (e) => {
      coins += power;
      createFloatNumber(power, e.clientX, e.clientY);
      save();
      updateUI();
    });

    btnBuyPower.addEventListener('click', () => {
      const cost = getPowerCost();
      if (coins >= cost) {
        coins -= cost;
        power += 1;
        save();
        updateUI();
      }
    });

    btnBuyAuto.addEventListener('click', () => {
      if (!autoEnabled && coins >= 100) {
        coins -= 100;
        autoEnabled = true;
        startAutoClick();
        save();
        updateUI();
      }
    });

    if (autoEnabled) startAutoClick();
    updateUI();
  </script>
</body>
</html>
