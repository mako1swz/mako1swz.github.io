<!DOCTYPE html>
<html lang="ru">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta charset="UTF-8" />
  <title>Кликер</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg: var(--tg-theme-bg-color, #111216);
      --text: var(--tg-theme-text-color, #ffffff);
      --btn: var(--tg-theme-button-color, #ff9f0a);
      --btn-text: var(--tg-theme-button-text-color, #000000);
      --secondary: var(--tg-theme-secondary-bg-color, #1c1f26);
      --border: rgba(255,255,255,0.08);
      --accent: #ff9f0a;
      --success: #4caf50;
      --danger: #ff5252;
      --muted: #9ca3af;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,159,10,0.14), transparent 35%),
        var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      padding: 16px;
      overflow-x: hidden;
    }

    .wrapper {
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding-bottom: 18px;
    }

    #score {
      font-size: 64px;
      font-weight: 800;
      line-height: 1;
      text-align: center;
      margin-top: 8px;
      text-shadow: 0 0 24px rgba(255,159,10,0.18);
    }

    .label {
      color: #a9a9b2;
      font-size: 14px;
      text-align: center;
      margin-top: -6px;
    }

    .stats-panel,
    .shop-container,
    .tabs {
      width: 100%;
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(10px);
      border-radius: 18px;
      border: 1px solid var(--border);
      box-shadow: 0 10px 30px rgba(0,0,0,0.22);
    }

    .tabs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      overflow: hidden;
    }

    .tab-btn {
      border: none;
      background: transparent;
      color: var(--muted);
      padding: 14px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
    }

    .tab-btn.active {
      background: rgba(255,159,10,0.16);
      color: #fff;
    }

    .panel {
      display: none;
      width: 100%;
    }

    .panel.active {
      display: block;
    }

    .stats-panel {
      padding: 14px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .stat-item {
      text-align: center;
      padding: 10px;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
    }

    .stat-label {
      font-size: 11px;
      color: #8c8c95;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 6px;
    }

    .stat-value {
      font-weight: 800;
      font-size: 24px;
      color: var(--accent);
    }

    #clickBtn {
      width: 240px;
      height: 240px;
      border-radius: 50%;
      border: none;
      background: radial-gradient(circle at 30% 30%, #ffd08a, var(--btn));
      color: var(--btn-text);
      font-size: 34px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.42);
      user-select: none;
      transition: transform 0.08s ease, box-shadow 0.2s ease, filter 0.2s ease;
      position: relative;
      overflow: hidden;
      align-self: center;
      margin-top: 8px;
    }

    #clickBtn:active {
      transform: scale(0.94);
      filter: brightness(1.05);
    }

    #clickBtn.autopulse {
      animation: pulse 1.6s infinite;
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.45), 0 16px 40px rgba(0,0,0,0.42); }
      70% { box-shadow: 0 0 0 18px rgba(76, 175, 80, 0), 0 16px 40px rgba(0,0,0,0.42); }
      100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0), 0 16px 40px rgba(0,0,0,0.42); }
    }

    .shop-container {
      padding: 14px;
    }

    .shop-title {
      margin: 0 0 10px 0;
      font-size: 18px;
      font-weight: 800;
      text-align: center;
    }

    .upgrade-row {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
    }

    .upgrade-row:last-child {
      border-bottom: none;
    }

    .upgrade-info {
      min-width: 0;
      flex: 1;
    }

    .upgrade-name {
      display: block;
      font-weight: 700;
      font-size: 15px;
    }

    .upgrade-desc {
      display: block;
      font-size: 12px;
      color: var(--muted);
      margin-top: 3px;
    }

    .upgrade-actions {
      min-width: 108px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 6px;
    }

    .upgrade-price {
      font-weight: 800;
      font-size: 15px;
      color: var(--accent);
    }

    .progress-bar {
      width: 100%;
      height: 5px;
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--success), #7be57f);
      transition: width 0.25s ease;
    }

    .buy-btn {
      border: none;
      background: rgba(255,255,255,0.06);
      color: #fff;
      cursor: pointer;
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      min-width: 92px;
    }

    .buy-btn:disabled {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .buy-btn.owned {
      background: var(--success);
      color: #000;
    }

    .float-number {
      position: fixed;
      pointer-events: none;
      font-weight: 800;
      color: var(--accent);
      font-size: 24px;
      animation: floatUp 0.9s forwards;
      z-index: 999;
      text-shadow: 0 0 12px rgba(255,159,10,0.25);
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-90px) scale(1.35); }
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div id="score">0</div>
    <div class="label">Монет: <span id="coins">0</span></div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="game">Игра</button>
      <button class="tab-btn" data-tab="shop">Магазин</button>
    </div>

    <div class="panel active" id="gamePanel">
      <div class="stats-panel">
        <div class="stat-item">
          <div class="stat-label">Сила клика</div>
          <div class="stat-value" id="statPower">1</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">Доход/сек</div>
          <div class="stat-value" id="statPerSec">0</div>
        </div>
      </div>

      <button id="clickBtn">КЛИК</button>
    </div>

    <div class="panel" id="shopPanel">
      <div class="shop-container">
        <h3 class="shop-title">Магазин улучшений</h3>

        <div class="upgrade-row">
          <div class="upgrade-info">
            <span class="upgrade-name">Сила клика +1</span>
            <span class="upgrade-desc">Увеличивает доход за клик</span>
          </div>
          <div class="upgrade-actions">
            <span class="upgrade-price" id="pricePower">25</span>
            <div class="progress-bar"><div class="progress-fill" id="progPower"></div></div>
            <button class="buy-btn" id="btnBuyPower">Купить</button>
          </div>
        </div>

        <div class="upgrade-row">
          <div class="upgrade-info">
            <span class="upgrade-name">Автокликер</span>
            <span class="upgrade-desc">+1 монета в секунду</span>
          </div>
          <div class="upgrade-actions">
            <span class="upgrade-price" id="priceAuto">50</span>
            <div class="progress-bar"><div class="progress-fill" id="progAuto"></div></div>
            <button class="buy-btn" id="btnBuyAuto">Купить</button>
          </div>
        </div>

        <div class="upgrade-row">
          <div class="upgrade-info">
            <span class="upgrade-name">Усиление автоклика</span>
            <span class="upgrade-desc">Удваивает доход от автоклика</span>
          </div>
          <div class="upgrade-actions">
            <span class="upgrade-price" id="priceAutoBoost">120</span>
            <div class="progress-bar"><div class="progress-fill" id="progAutoBoost"></div></div>
            <button class="buy-btn" id="btnBuyAutoBoost">Купить</button>
          </div>
        </div>

        <div class="upgrade-row">
          <div class="upgrade-info">
            <span class="upgrade-name">Крит-клик</span>
            <span class="upgrade-desc">Иногда даёт x2 за клик</span>
          </div>
          <div class="upgrade-actions">
            <span class="upgrade-price" id="priceCrit">80</span>
            <div class="progress-bar"><div class="progress-fill" id="progCrit"></div></div>
            <button class="buy-btn" id="btnBuyCrit">Купить</button>
          </div>
        </div>

        <div class="upgrade-row">
          <div class="upgrade-info">
            <span class="upgrade-name">Скидка на магазин</span>
            <span class="upgrade-desc">Снижает цены всех будущих покупок</span>
          </div>
          <div class="upgrade-actions">
            <span class="upgrade-price" id="priceDiscount">150</span>
            <div class="progress-bar"><div class="progress-fill" id="progDiscount"></div></div>
            <button class="buy-btn" id="btnBuyDiscount">Купить</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) {
      tg.ready();
      tg.expand();
    }

    const LS = {
      coins: 'clicker_coins',
      power: 'clicker_power',
      auto: 'clicker_auto',
      autoBoost: 'clicker_autoBoost',
      crit: 'clicker_crit',
      discount: 'clicker_discount'
    };

    let coins = Number(localStorage.getItem(LS.coins) || 0);
    let power = Number(localStorage.getItem(LS.power) || 1);
    let autoEnabled = localStorage.getItem(LS.auto) === 'true';
    let autoBoost = localStorage.getItem(LS.autoBoost) === 'true';
    let critEnabled = localStorage.getItem(LS.crit) === 'true';
    let discountEnabled = localStorage.getItem(LS.discount) === 'true';

    let autoInterval = null;

    const scoreEl = document.getElementById('score');
    const coinsEl = document.getElementById('coins');
    const statPowerEl = document.getElementById('statPower');
    const statPerSecEl = document.getElementById('statPerSec');
    const clickBtn = document.getElementById('clickBtn');

    const tabBtns = document.querySelectorAll('.tab-btn');
    const gamePanel = document.getElementById('gamePanel');
    const shopPanel = document.getElementById('shopPanel');

    const btnBuyPower = document.getElementById('btnBuyPower');
    const btnBuyAuto = document.getElementById('btnBuyAuto');
    const btnBuyAutoBoost = document.getElementById('btnBuyAutoBoost');
    const btnBuyCrit = document.getElementById('btnBuyCrit');
    const btnBuyDiscount = document.getElementById('btnBuyDiscount');

    const pricePowerEl = document.getElementById('pricePower');
    const priceAutoEl = document.getElementById('priceAuto');
    const priceAutoBoostEl = document.getElementById('priceAutoBoost');
    const priceCritEl = document.getElementById('priceCrit');
    const priceDiscountEl = document.getElementById('priceDiscount');

    const progPowerEl = document.getElementById('progPower');
    const progAutoEl = document.getElementById('progAuto');
    const progAutoBoostEl = document.getElementById('progAutoBoost');
    const progCritEl = document.getElementById('progCrit');
    const progDiscountEl = document.getElementById('progDiscount');

    function discountMul() {
      return discountEnabled ? 0.85 : 1;
    }

    function getPowerCost() {
      return Math.floor(25 * Math.pow(1.25, power - 1) * discountMul());
    }

    function getAutoCost() {
      return Math.floor(50 * discountMul());
    }

    function getAutoBoostCost() {
      return Math.floor(120 * discountMul());
    }

    function getCritCost() {
      return Math.floor(80 * discountMul());
    }

    function getDiscountCost() {
      return Math.floor(150 * discountMul());
    }

    function getAutoPerSec() {
      let income = autoEnabled ? 1 : 0;
      if (autoBoost && autoEnabled) income *= 2;
      return income;
    }

    function save() {
      localStorage.setItem(LS.coins, String(coins));
      localStorage.setItem(LS.power, String(power));
      localStorage.setItem(LS.auto, String(autoEnabled));
      localStorage.setItem(LS.autoBoost, String(autoBoost));
      localStorage.setItem(LS.crit, String(critEnabled));
      localStorage.setItem(LS.discount, String(discountEnabled));

      if (tg?.sendData) {
        tg.sendData(JSON.stringify({
          coins, power, autoEnabled, autoBoost, critEnabled, discountEnabled
        }));
      }
    }

    function updateUI() {
      scoreEl.textContent = coins;
      coinsEl.textContent = coins;
      statPowerEl.textContent = power;
      statPerSecEl.textContent = getAutoPerSec();

      const costPower = getPowerCost();
      const costAuto = getAutoCost();
      const costAutoBoost = getAutoBoostCost();
      const costCrit = getCritCost();
      const costDiscount = getDiscountCost();

      pricePowerEl.textContent = costPower;
      priceAutoEl.textContent = costAuto;
      priceAutoBoostEl.textContent = costAutoBoost;
      priceCritEl.textContent = costCrit;
      priceDiscountEl.textContent = costDiscount;

      progPowerEl.style.width = Math.min(100, (coins / costPower) * 100) + '%';
      progAutoEl.style.width = Math.min(100, (coins / costAuto) * 100) + '%';
      progAutoBoostEl.style.width = Math.min(100, (coins / costAutoBoost) * 100) + '%';
      progCritEl.style.width = Math.min(100, (coins / costCrit) * 100) + '%';
      progDiscountEl.style.width = Math.min(100, (coins / costDiscount) * 100) + '%';

      btnBuyPower.disabled = coins < costPower;
      btnBuyAuto.disabled = coins < costAuto || autoEnabled;
      btnBuyAutoBoost.disabled = coins < costAutoBoost || autoBoost || !autoEnabled;
      btnBuyCrit.disabled = coins < costCrit || critEnabled;
      btnBuyDiscount.disabled = coins < costDiscount || discountEnabled;

      btnBuyAuto.textContent = autoEnabled ? 'ВКЛ' : 'Купить';
      btnBuyAutoBoost.textContent = autoBoost ? 'ВКЛ' : 'Купить';
      btnBuyCrit.textContent = critEnabled ? 'ВКЛ' : 'Купить';
      btnBuyDiscount.textContent = discountEnabled ? 'ВКЛ' : 'Купить';

      clickBtn.classList.toggle('autopulse', autoEnabled);
    }

    function createFloatNumber(amount, x, y) {
      const el = document.createElement('div');
      el.className = 'float-number';
      el.textContent = '+' + amount;
      el.style.left = x + 'px';
      el.style.top = y + 'px';
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    function startAutoClick() {
      clearInterval(autoInterval);
      autoInterval = setInterval(() => {
        if (!autoEnabled) return;
        let gain = 1;
        if (autoBoost) gain *= 2;
        coins += gain;
        save();
        updateUI();
      }, 1000);
    }

    tabBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        tabBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const tab = btn.dataset.tab;
        gamePanel.classList.toggle('active', tab === 'game');
        shopPanel.classList.toggle('active', tab === 'shop');
      });
    });

    clickBtn.addEventListener('click', (e) => {
      let gain = power;
      if (critEnabled && Math.random() < 0.15) {
        gain *= 2;
      }
      coins += gain;
      createFloatNumber(gain, e.clientX, e.clientY);
      save();
      updateUI();
    });

    btnBuyPower.addEventListener('click', () => {
      const cost = getPowerCost();
      if (coins >= cost) {
        coins -= cost;
        power += 1;
        save();
        updateUI();
      }
    });

    btnBuyAuto.addEventListener('click', () => {
      const cost = getAutoCost();
      if (!autoEnabled && coins >= cost) {
        coins -= cost;
        autoEnabled = true;
        startAutoClick();
        save();
        updateUI();
      }
    });

    btnBuyAutoBoost.addEventListener('click', () => {
      const cost = getAutoBoostCost();
      if (autoEnabled && !autoBoost && coins >= cost) {
        coins -= cost;
        autoBoost = true;
        save();
        updateUI();
      }
    });

    btnBuyCrit.addEventListener('click', () => {
      const cost = getCritCost();
      if (!critEnabled && coins >= cost) {
        coins -= cost;
        critEnabled = true;
        save();
        updateUI();
      }
    });

    btnBuyDiscount.addEventListener('click', () => {
      const cost = getDiscountCost();
      if (!discountEnabled && coins >= cost) {
        coins -= cost;
        discountEnabled = true;
        save();
        updateUI();
      }
    });

    if (autoEnabled) startAutoClick();
    updateUI();
  </script>
</body>
</html>
